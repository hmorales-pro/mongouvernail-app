<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="#2E86F0" stroke-width="18" opacity="0.9"/>
  <!-- Ring gaps (top, right, bottom, left) -->
  <rect x="230" y="68" width="52" height="24" fill="url(#bg)"/>
  <rect x="418" y="242" width="24" height="28" fill="url(#bg)"/>
  <rect x="230" y="420" width="52" height="24" fill="url(#bg)"/>
  <rect x="70" y="242" width="24" height="28" fill="url(#bg)"/>
  <!-- Compass star - North point (tall) -->
  <polygon points="256,72 272,232 256,256 240,232" fill="#2E86F0"/>
  <!-- Compass star - South point (tall) -->
  <polygon points="256,440 240,280 256,256 272,280" fill="#2E86F0"/>
  <!-- Compass star - East point -->
  <polygon points="420,256 280,240 256,256 280,272" fill="#2E86F0" opacity="0.75"/>
  <!-- Compass star - West point -->
  <polygon points="92,256 232,272 256,256 232,240" fill="#2E86F0" opacity="0.75"/>
  <!-- Inner circle accent -->
  <circle cx="256" cy="256" r="16" fill="#2E86F0" opacity="0.6"/>
</svg>
